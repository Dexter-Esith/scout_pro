{% extends 'base.html' %}

{% block content %}
<div class="max-w-md mx-auto mt-16">
    <div class="bg-[#1a1d27] rounded-xl border border-red-500/20 p-8 text-center">
        <div class="w-16 h-16 bg-red-500/10 rounded-full flex items-center justify-center mx-auto mb-4">
            <svg class="w-8 h-8 text-red-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
        </div>
        <h2 class="text-xl font-bold mb-2">Delete Player?</h2>
        <p class="text-gray-400 text-sm mb-1">You are about to delete</p>
        <p class="text-white font-semibold mb-1">{{ player.full_name }}</p>
        <p class="text-gray-500 text-xs mb-8">This will also delete all reports for this player.</p>

        <form method="POST" class="flex gap-3">
            {% csrf_token %}
            <a href="/players/{{ player.pk }}/" class="flex-1 py-3 bg-[#0f1117] hover:bg-[#1e2235] border border-gray-700 text-gray-400 rounded-lg transition text-center text-sm font-semibold">
                Cancel
            </a>
            <button type="submit" class="flex-1 py-3 bg-red-500 hover:bg-red-600 text-white rounded-lg transition text-sm font-semibold">
                Yes, Delete
            </button>
        </form>
    </div>
</div>
{% endblock %}
