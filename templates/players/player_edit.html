{% extends 'base.html' %}

{% block content %}
<div class="max-w-3xl mx-auto">
    <div class="flex items-center gap-4 mb-8">
        <a href="/players/{{ player.pk }}/" class="text-gray-500 hover:text-white transition">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
        </a>
        <h1 class="text-2xl font-bold">Edit Player</h1>
    </div>

    <form method="POST" enctype="multipart/form-data" class="space-y-6">
        {% csrf_token %}

        <div class="bg-[#1a1d27] rounded-xl border border-gray-800 p-6">
            <h3 class="font-semibold mb-5 text-sm text-gray-400 uppercase tracking-wider">Basic Info</h3>
            <div class="grid grid-cols-2 gap-4">

                <div class="col-span-2">
                    <label class="block text-sm text-gray-400 mb-2">Full Name</label>
                    <input type="text" name="full_name" value="{{ player.full_name }}" required
                        class="w-full bg-[#0f1117] border border-gray-700 rounded-lg px-4 py-3 text-sm text-white focus:outline-none focus:border-green-500 transition">
                </div>

                <div>
                    <label class="block text-sm text-gray-400 mb-2">Date of Birth</label>
                    <input type="date" name="date_of_birth" value="{{ player.date_of_birth|date:'Y-m-d' }}" required
                        class="w-full bg-[#0f1117] border border-gray-700 rounded-lg px-4 py-3 text-sm text-white focus:outline-none focus:border-green-500 transition">
                </div>

                <div>
                    <label class="block text-sm text-gray-400 mb-2">Nationality</label>
                    <input type="text" name="nationality" value="{{ player.nationality }}" required
                        class="w-full bg-[#0f1117] border border-gray-700 rounded-lg px-4 py-3 text-sm text-white focus:outline-none focus:border-green-500 transition">
                </div>

                <div>
                    <label class="block text-sm text-gray-400 mb-2">Club</label>
                    <input type="text" name="club" value="{{ player.club }}" required
                        class="w-full bg-[#0f1117] border border-gray-700 rounded-lg px-4 py-3 text-sm text-white focus:outline-none focus:border-green-500 transition">
                </div>

                <div>
                    <label class="block text-sm text-gray-400 mb-2">Position</label>
                    <select name="position" required
                        class="w-full bg-[#0f1117] border border-gray-700 rounded-lg px-4 py-3 text-sm text-white focus:outline-none focus:border-green-500 transition">
                        {% for val, label in player.POSITION_CHOICES %}
                        <option value="{{ val }}" {% if player.position == val %}selected{% endif %}>{{ val }} — {{ label }}</option>
                        {% endfor %}
                    </select>
                </div>

                <div>
                    <label class="block text-sm text-gray-400 mb-2">Preferred Foot</label>
                    <select name="preferred_foot" required
                        class="w-full bg-[#0f1117] border border-gray-700 rounded-lg px-4 py-3 text-sm text-white focus:outline-none focus:border-green-500 transition">
                        <option value="Left" {% if player.preferred_foot == 'Left' %}selected{% endif %}>Left</option>
                        <option value="Right" {% if player.preferred_foot == 'Right' %}selected{% endif %}>Right</option>
                        <option value="Both" {% if player.preferred_foot == 'Both' %}selected{% endif %}>Both</option>
                    </select>
                </div>

                <div>
                    <label class="block text-sm text-gray-400 mb-2">Height (cm)</label>
                    <input type="number" name="height" value="{{ player.height }}" required
                        class="w-full bg-[#0f1117] border border-gray-700 rounded-lg px-4 py-3 text-sm text-white focus:outline-none focus:border-green-500 transition">
                </div>

                <div>
                    <label class="block text-sm text-gray-400 mb-2">Weight (kg)</label>
                    <input type="number" name="weight" value="{{ player.weight }}" required
                        class="w-full bg-[#0f1117] border border-gray-700 rounded-lg px-4 py-3 text-sm text-white focus:outline-none focus:border-green-500 transition">
                </div>

            </div>
        </div>

        <div class="bg-[#1a1d27] rounded-xl border border-gray-800 p-6">
            <h3 class="font-semibold mb-5 text-sm text-gray-400 uppercase tracking-wider">Additional Info</h3>
            <div class="grid grid-cols-2 gap-4">

                <div>
                    <label class="block text-sm text-gray-400 mb-2">Market Value (€)</label>
                    <input type="number" name="market_value" value="{{ player.market_value|default:'' }}"
                        class="w-full bg-[#0f1117] border border-gray-700 rounded-lg px-4 py-3 text-sm text-white focus:outline-none focus:border-green-500 transition">
                </div>

                <div>
                    <label class="block text-sm text-gray-400 mb-2">Contract Expiry</label>
                    <input type="date" name="contract_expiry" value="{{ player.contract_expiry|date:'Y-m-d'|default:'' }}"
                        class="w-full bg-[#0f1117] border border-gray-700 rounded-lg px-4 py-3 text-sm text-white focus:outline-none focus:border-green-500 transition">
                </div>

                <div>
                    <label class="block text-sm text-gray-400 mb-2">Agent</label>
                    <input type="text" name="agent" value="{{ player.agent|default:'' }}"
                        class="w-full bg-[#0f1117] border border-gray-700 rounded-lg px-4 py-3 text-sm text-white focus:outline-none focus:border-green-500 transition">
                </div>

                <div>
                    <label class="block text-sm text-gray-400 mb-2">Photo</label>
                    {% if player.photo %}
                    <div class="flex items-center gap-3 mb-2">
                        <img src="{{ player.photo.url }}" class="w-10 h-10 rounded-lg object-cover">
                        <span class="text-gray-500 text-xs">Current photo</span>
                    </div>
                    {% endif %}
                    <input type="file" name="photo" accept="image/*"
                        class="w-full bg-[#0f1117] border border-gray-700 rounded-lg px-4 py-3 text-sm text-gray-400 focus:outline-none focus:border-green-500 transition">
                </div>

            </div>
        </div>

        <div class="flex gap-3">
            <button type="submit" class="flex-1 bg-green-500 hover:bg-green-600 text-white font-semibold py-3 rounded-lg transition">
                Save Changes
            </button>
            <a href="/players/{{ player.pk }}/" class="px-6 py-3 bg-[#1a1d27] hover:bg-[#1e2235] border border-gray-700 text-gray-400 rounded-lg transition text-center">
                Cancel
            </a>
            <a href="/players/{{ player.pk }}/delete/" class="px-6 py-3 bg-red-500/10 hover:bg-red-500/20 border border-red-500/30 text-red-400 rounded-lg transition text-center">
                Delete
            </a>
        </div>
    </form>
</div>
{% endblock %}
