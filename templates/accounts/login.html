{% extends 'base.html' %}

{% block content %}
<div class="min-h-screen flex items-center justify-center">
    <div class="w-full max-w-md">

        <div class="text-center mb-8">
            <div class="inline-flex items-center gap-3">
                <div class="w-10 h-10 bg-green-500 rounded-lg flex items-center justify-center font-bold text-sm">SP</div>
                <div class="text-left">
                    <div class="text-xl font-bold text-white">SCOUT PRO</div>
                    <div class="text-xs text-gray-400">Football Scouting System</div>
                </div>
            </div>
        </div>

        <div class="bg-[#1a1d27] rounded-2xl p-8 border border-gray-800">
            <h2 class="text-2xl font-bold mb-2">Welcome back</h2>
            <p class="text-gray-400 mb-8 text-sm">Sign in to your account</p>

            {% if error %}
            <div class="bg-red-500/10 border border-red-500/30 rounded-lg p-3 mb-6 text-red-400 text-sm">
                {{ error }}
            </div>
            {% endif %}

            <form method="POST">
                {% csrf_token %}

                <div class="mb-4">
                    <label class="block text-sm text-gray-400 mb-2">Email</label>
                    <input type="email" name="email"
                        class="w-full bg-[#0f1117] border border-gray-700 rounded-lg px-4 py-3 text-white focus:outline-none focus:border-green-500 transition"
                        placeholder="your@email.com" autofocus>
                </div>

                <div class="mb-6">
                    <label class="block text-sm text-gray-400 mb-2">Password</label>
                    <input type="password" name="password"
                        class="w-full bg-[#0f1117] border border-gray-700 rounded-lg px-4 py-3 text-white focus:outline-none focus:border-green-500 transition"
                        placeholder="Enter password">
                </div>

                <button type="submit" class="w-full bg-green-500 hover:bg-green-600 text-white font-semibold py-3 rounded-lg transition">
                    Sign In
                </button>
            </form>

            <div class="text-center mt-6">
                <a href="/accounts/register/" class="text-gray-500 text-sm hover:text-gray-300 transition">
                    Have an invite code? Register →
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
