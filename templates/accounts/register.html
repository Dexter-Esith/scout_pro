{% extends 'base.html' %}

{% block content %}
<div class="min-h-screen flex items-center justify-center">
    <div class="w-full max-w-md">

        <div class="text-center mb-8">
            <div class="inline-flex items-center gap-3">
                <div class="w-10 h-10 bg-green-500 rounded-lg flex items-center justify-center font-bold text-sm">SP</div>
                <div class="text-left">
                    <div class="text-xl font-bold">SCOUT PRO</div>
                    <div class="text-xs text-gray-400">Football Scouting System</div>
                </div>
            </div>
        </div>

        <div class="bg-[#1a1d27] rounded-2xl p-8 border border-gray-800">
            <h2 class="text-2xl font-bold mb-2">Create Account</h2>
            <p class="text-gray-400 text-sm mb-8">You need an invite code to register.</p>

            {% if error %}
            <div class="bg-red-500/10 border border-red-500/30 rounded-lg p-3 mb-6 text-red-400 text-sm">
                {{ error }}
            </div>
            {% endif %}

            <form method="POST" class="space-y-4">
                {% csrf_token %}

                <div>
                    <label class="block text-sm text-gray-400 mb-2">Invite Code</label>
                    <input type="text" name="invite_code" value="{{ code|default:'' }}"
                        class="w-full bg-[#0f1117] border border-gray-700 rounded-lg px-4 py-3 text-white text-sm focus:outline-none focus:border-green-500 transition uppercase tracking-widest"
                        placeholder="e.g. ABC123XYZ">
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm text-gray-400 mb-2">First Name</label>
                        <input type="text" name="first_name" value="{{ first_name|default:'' }}"
                            class="w-full bg-[#0f1117] border border-gray-700 rounded-lg px-4 py-3 text-white text-sm focus:outline-none focus:border-green-500 transition"
                            placeholder="Giorgi">
                    </div>
                    <div>
                        <label class="block text-sm text-gray-400 mb-2">Last Name</label>
                        <input type="text" name="last_name" value="{{ last_name|default:'' }}"
                            class="w-full bg-[#0f1117] border border-gray-700 rounded-lg px-4 py-3 text-white text-sm focus:outline-none focus:border-green-500 transition"
                            placeholder="Beridze">
                    </div>
                </div>

                <div>
                    <label class="block text-sm text-gray-400 mb-2">Email</label>
                    <input type="email" name="email" value="{{ email|default:'' }}"
                        class="w-full bg-[#0f1117] border border-gray-700 rounded-lg px-4 py-3 text-white text-sm focus:outline-none focus:border-green-500 transition"
                        placeholder="your@email.com">
                </div>

                <div>
                    <label class="block text-sm text-gray-400 mb-2">Password</label>
                    <input type="password" name="password"
                        class="w-full bg-[#0f1117] border border-gray-700 rounded-lg px-4 py-3 text-white text-sm focus:outline-none focus:border-green-500 transition"
                        placeholder="Min. 6 characters">
                </div>

                <div>
                    <label class="block text-sm text-gray-400 mb-2">Confirm Password</label>
                    <input type="password" name="password2"
                        class="w-full bg-[#0f1117] border border-gray-700 rounded-lg px-4 py-3 text-white text-sm focus:outline-none focus:border-green-500 transition"
                        placeholder="Repeat password">
                </div>

                <button type="submit" class="w-full bg-green-500 hover:bg-green-600 text-white font-semibold py-3 rounded-lg transition mt-2">
                    Create Account
                </button>
            </form>

            <div class="text-center mt-6">
                <a href="/accounts/login/" class="text-gray-500 text-sm hover:text-gray-300 transition">
                    Already have an account? Sign in →
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
