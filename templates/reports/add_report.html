{% extends 'base.html' %}

{% block content %}

<div class="max-w-2xl mx-auto">
    <div class="flex items-center gap-4 mb-8">
        <a href="/players/{{ player.pk }}/" class="text-gray-500 hover:text-white transition">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
        </a>
        <h1 class="text-2xl font-bold">Add Report</h1>
    </div>

    <div class="bg-[#1a1d27] rounded-xl border border-gray-800 p-6">
        <div class="flex items-center gap-3 mb-6 pb-6 border-b border-gray-800">
            <div class="w-10 h-10 bg-[#0f1117] rounded-full border border-gray-700 flex items-center justify-center font-bold text-gray-400">
                {{ player.full_name|first }}
            </div>
            <div>
                <div class="font-semibold">{{ player.full_name }}</div>
                <div class="text-gray-400 text-sm">{{ player.club }} · {{ player.position }}</div>
            </div>
        </div>

        <form method="POST" class="space-y-4">
            {% csrf_token %}

            <div>
                <label class="block text-sm text-gray-400 mb-2">Match Name</label>
                <input type="text" name="match_name" placeholder="e.g. Dinamo Tbilisi vs Saburtalo"
                    class="w-full bg-[#0f1117] border border-gray-700 rounded-lg px-4 py-3 text-sm text-white focus:outline-none focus:border-green-500 transition">
            </div>

            <div>
                <label class="block text-sm text-gray-400 mb-2">Rating (1-10)</label>
                <input type="number" name="rating" min="1" max="10" step="0.1" placeholder="7.5"
                    class="w-full bg-[#0f1117] border border-gray-700 rounded-lg px-4 py-3 text-sm text-white focus:outline-none focus:border-green-500 transition">
            </div>

            <div>
                <label class="block text-sm text-gray-400 mb-2">Strengths</label>
                <textarea name="strengths" rows="3" placeholder="What did the player do well?"
                    class="w-full bg-[#0f1117] border border-gray-700 rounded-lg px-4 py-3 text-sm text-white focus:outline-none focus:border-green-500 transition resize-none"></textarea>
            </div>

            <div>
                <label class="block text-sm text-gray-400 mb-2">Weaknesses</label>
                <textarea name="weaknesses" rows="3" placeholder="Areas for improvement?"
                    class="w-full bg-[#0f1117] border border-gray-700 rounded-lg px-4 py-3 text-sm text-white focus:outline-none focus:border-green-500 transition resize-none"></textarea>
            </div>

            <div>
                <label class="block text-sm text-gray-400 mb-2">Notes <span class="text-gray-600">(optional)</span></label>
                <textarea name="notes" rows="2" placeholder="Additional observations..."
                    class="w-full bg-[#0f1117] border border-gray-700 rounded-lg px-4 py-3 text-sm text-white focus:outline-none focus:border-green-500 transition resize-none"></textarea>
            </div>

            <button type="submit" class="w-full bg-green-500 hover:bg-green-600 text-white font-semibold py-3 rounded-lg transition">
                Save Report
            </button>
        </form>
    </div>
</div>

{% endblock %}
